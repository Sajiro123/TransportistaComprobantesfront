server {
    listen 80;
    server_name localhost;

    # Cabeceras de seguridad globales
   add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https://www.google.com https://www.gstatic.com; frame-src 'self' https://www.google.com; connect-src 'self' https://*.atu.gob.pe https://www.google.com https://www.gstatic.com; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    # Se comenta require-corp porque bloquea la carga de librerias externas desde CDNs (Tailwind, Google Fonts, reCAPTCHA, etc.) que no retornen cabeceras CORP.
    # add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Redirección forzada de HTTP a HTTPS si viene sin cifrar por un balanceador o proxy
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # Redirige la raiz / hacia /subsidio_transportista/
    location = / {
        return 301 /subsidio_transportista/;
    }

    # Sirve el frontend Angular con base-href /subsidio_transportista/
    location /subsidio_transportista/ {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /subsidio_transportista/index.html;
    }

    # Evitar caché para la configuración dinámica (env.front.js)
    location = /subsidio_transportista/env.front.js {
        alias /usr/share/nginx/html/subsidio_transportista/env.front.js;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # Cache de assets estáticos
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|json)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
